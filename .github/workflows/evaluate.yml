name: Evaluate Submission

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  validate_pr:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Validate changed files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prAuthor = context.payload.pull_request.user.login;
            const expectedFile = `submissions/${prAuthor}.py`;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const changedFiles = files.map((f) => f.filename);

            if (changedFiles.length !== 1) {
              core.setFailed(
                `PR must modify exactly one file (${expectedFile}), but it modifies ${changedFiles.length}: ${changedFiles.join(", ")}`,
              );
              return;
            }

            if (changedFiles[0] !== expectedFile) {
              core.setFailed(
                `PR must only modify ${expectedFile}, but it modifies ${changedFiles[0]}`,
              );
              return;
            }

            core.info(`PR correctly modifies only ${expectedFile}`);
            core.exportVariable('PR_AUTHOR', prAuthor);

  run_harness:
    needs: validate_pr
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: read
    outputs:
        results: ${{ steps.run_harness.outputs.results }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.14t
        uses: actions/setup-python@v6
        with:
          python-version: "3.14t"

      - name: Run Harness
        id: run_harness
        run: |
          set -o errexit
          set -o pipefail
          python challenge/harness.py --num-trials 3 --json submissions/${{ github.event.pull_request.user.login }}.py graphs | tee ${{ runner.temp }}/results.txt
          DATA=$(cat ${{ runner.temp }}/results.txt | jq -c .)
          echo "results=$DATA" >> "$GITHUB_OUTPUT"

  update_journal:
    needs: run_harness
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Update journal
        run: |
          set -e
          cat <<EOF > ${{ runner.temp }}/results.txt
          ${{ needs.run_harness.outputs.results }}
          EOF
          python scores/format_journal_entry.py ${{ github.event.pull_request.user.login }} ${{ github.event.pull_request.html_url }} ${{ github.event.pull_request.number }} ${{ runner.temp }}/results.txt >> scores/journal.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scores/journal.txt
          git commit -m "Log submission result from ${{ github.event.workflow_run.jobs.evaluate.pr_author }}"
          git push
