name: Evaluate Submission

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  validate_pr:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Validate changed files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prAuthor = context.payload.pull_request.user.login;
            const expectedFile = `submissions/${prAuthor}.py`;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const changedFiles = files.map((f) => f.filename);

            if (changedFiles.length !== 1) {
              core.setFailed(
                `PR must modify exactly one file (${expectedFile}), but it modifies ${changedFiles.length}: ${changedFiles.join(", ")}`,
              );
              return;
            }

            if (changedFiles[0] !== expectedFile) {
              core.setFailed(
                `PR must only modify ${expectedFile}, but it modifies ${changedFiles[0]}`,
              );
              return;
            }

            core.info(`PR correctly modifies only ${expectedFile}`);
            core.exportVariable('PR_AUTHOR', prAuthor);

  run_harness:
    needs: validate_pr
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: read
    outputs:
        results: ${{ steps.run_harness.outputs.results }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Debug CPU/GIL constraints
        run: |
          # What Python sees
          uv run --python python3.14.3t python -c "
          import sys, os
          print('GIL enabled:', sys._is_gil_enabled())
          print('CPU count:', os.cpu_count())
          print('Affinity:', len(os.sched_getaffinity(0)), os.sched_getaffinity(0))
          print('PYTHON_GIL env:', os.environ.get('PYTHON_GIL', '<not set>'))
          "

          # Process-level info
          nproc
          taskset -cp $$
          cat /proc/self/cgroup
          env | grep -iE "python|gil|cpu|proc|thread|affinity"

      - name: Run Harness
        id: run_harness
        timeout-minutes: 10
        run: |
          set -o errexit
          set -o pipefail
          uv run --python 3.14.3t challenge/harness.py --num-trials 3 --json submissions/${{ github.event.pull_request.user.login }}.py graphs | tee ${{ runner.temp }}/results.txt
          DATA=$(cat ${{ runner.temp }}/results.txt | jq -c .)
          echo "results=$DATA" >> "$GITHUB_OUTPUT"

  update_journal:
    needs: run_harness
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Check org membership
        id: check_meta
        run: |
          set -e
          USERNAME="${{ github.event.pull_request.user.login }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.ORG_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/facebook/members/${USERNAME}")
          if [ "$HTTP_CODE" = "204" ]; then
            echo "is_meta=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_meta=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update journal
        run: |
          set -e
          cat <<EOF > ${{ runner.temp }}/results.txt
          ${{ needs.run_harness.outputs.results }}
          EOF
          IS_META_FLAG=""
          if [ "${{ steps.check_meta.outputs.is_meta }}" = "true" ]; then
            IS_META_FLAG="--is-meta"
          fi
          python scores/format_journal_entry.py ${{ github.event.pull_request.user.login }} ${{ github.event.pull_request.html_url }} ${{ github.event.pull_request.number }} ${{ runner.temp }}/results.txt $IS_META_FLAG >> scores/journal.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add scores/journal.txt
          git commit -m "Log submission result from ${{ github.event.workflow_run.jobs.evaluate.pr_author }}"
          git push

  report_results:
    needs: run_harness
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Fetch results
        id: fetch_results
        run: |
          cat <<EOF > ${{ runner.temp }}/results.txt
          ${{ needs.run_harness.outputs.results }}
          EOF

      - name: Post score comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          RESULTS_FILE: ${{ runner.temp }}/results.txt
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- pycon26-ft-score -->";
            const results = JSON.parse(fs.readFileSync(process.env.RESULTS_FILE, "utf8"));
            const passed = results.summary.overall_passed;
            const title = passed ? "## ✅ Results" : "## ❌ Results: DNF";

            const lines = [
              marker,
              title,
              "",
              `| Metric | Value |`,
              `| ------ | ----- |`,
              `| **Speedup** | ${results.summary.overall_speedup}x |`,
              `| **Passed** | ${results.summary.overall_passed} |`,
              `| **Graphs** | ${(results.results || []).length} |`,
            ];

            if (results.results && results.results.length > 0) {
              lines.push("", "### Per-graph results", "");
              lines.push("| Graph | Speedup | Status |");
              lines.push("| ----- | ------: | :----: |");
              for (const r of results.results) {
                const s = r.passed ? "✅" : "❌";
                lines.push(`| ${r.graph} | ${r.speedup}x | ${s} |`);
              }
            }

            if (results.error) {
              lines.push("", `**Error:** ${score.error}`);
            }

            const body = lines.join("\n");
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(c =>
              c.user?.type === "Bot" && c.body?.includes(marker)
            );

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });
