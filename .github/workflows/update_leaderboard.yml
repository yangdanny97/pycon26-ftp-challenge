name: Update Leaderboard

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-leaderboard
  cancel-in-progress: true

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    outputs:
      pages_ready: ${{ steps.push.outputs.pages_ready }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate leaderboard
        run: python3 scores/generate_leaderboard.py scores/journal.txt > scores/leaderboard.json

      - name: Commit and push
        id: push
        run: |
          set -euo pipefail

          if git diff --quiet -- scores/leaderboard.json; then
            echo "No changes to leaderboard."
            echo "pages_ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scores/leaderboard.json
          git commit -m "Update leaderboard"
          git push origin HEAD:main
          echo "pages_ready=true" >> "$GITHUB_OUTPUT"

  deploy-pages:
    runs-on: ubuntu-latest
    needs: update-leaderboard
    if: needs.update-leaderboard.outputs.pages_ready == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/pages"
          cp -R leaderboard "$RUNNER_TEMP/pages/leaderboard"
          mkdir -p "$RUNNER_TEMP/pages/scores"
          cp scores/leaderboard.json "$RUNNER_TEMP/pages/scores/leaderboard.json"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/pages

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
